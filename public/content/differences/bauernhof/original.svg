<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#87CEEB"/>
  <rect x="0" y="400" width="800" height="200" fill="#6BCB77"/>
  <!-- Sun -->
  <circle cx="680" cy="80" r="50" fill="#FFD93D"/>
  <!-- Barn -->
  <rect x="150" y="200" width="200" height="200" fill="#FF6B6B"/>
  <polygon points="150,200 250,100 350,200" fill="#CC3333"/>
  <rect x="210" y="320" width="80" height="80" fill="#8B4513"/>
  <!-- Small house -->
  <rect x="450" y="250" width="180" height="150" fill="#FFD93D"/>
  <polygon points="450,250 540,170 630,250" fill="#FFA500"/>
  <rect x="510" y="330" width="60" height="70" fill="#8B4513"/>
  <!-- Tree left -->
  <rect x="80" y="350" width="20" height="60" fill="#8B4513"/>
  <circle cx="90" cy="330" r="40" fill="#228B22"/>
  <!-- Tree right -->
  <rect x="680" y="360" width="20" height="50" fill="#8B4513"/>
  <circle cx="690" cy="340" r="35" fill="#228B22"/>
  <!-- Fence -->
  <rect x="0" y="390" width="800" height="10" fill="#DEB887"/>
  <rect x="100" y="360" width="10" height="40" fill="#DEB887"/>
  <rect x="200" y="360" width="10" height="40" fill="#DEB887"/>
  <rect x="300" y="360" width="10" height="40" fill="#DEB887"/>
  <rect x="400" y="360" width="10" height="40" fill="#DEB887"/>
  <rect x="500" y="360" width="10" height="40" fill="#DEB887"/>
  <rect x="600" y="360" width="10" height="40" fill="#DEB887"/>
  <rect x="700" y="360" width="10" height="40" fill="#DEB887"/>
  <!-- Cloud -->
  <ellipse cx="200" cy="80" rx="70" ry="35" fill="white"/>
  <ellipse cx="240" cy="65" rx="50" ry="30" fill="white"/>
  <ellipse cx="160" cy="70" rx="45" ry="28" fill="white"/>
  <!-- Cow -->
  <rect x="340" y="430" width="80" height="50" fill="white"/>
  <rect x="340" y="430" width="30" height="20" fill="#333"/>
  <rect x="350" y="475" width="12" height="25" fill="white"/>
  <rect x="375" y="475" width="12" height="25" fill="white"/>
  <rect x="398" y="475" width="12" height="25" fill="white"/>
  <ellipse cx="320" cy="450" rx="30" ry="20" fill="white"/>
  <circle cx="308" cy="443" r="4" fill="#333"/>
  <text x="400" y="580" text-anchor="middle" font-size="18" fill="#555" font-family="sans-serif">Original</text>
</svg>
