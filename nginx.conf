server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # All routes fall back to index.html (hash routing handles the rest client-side)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed JS/CSS assets produced by Vite
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Medium cache for images and fonts
    location ~* \.(svg|png|jpg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # No cache for content JSON (allows updating game data without a full rebuild)
    location ~* \.json$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;
}
